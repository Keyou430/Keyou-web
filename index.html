<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyou Web</title>
  <style>
    /* ====== Reset & Base ====== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #000000;
      --surface:   #09090b;
      --border:    #1a1a1a;
      --text:      #e4e4e7;
      --muted:     #a1a1aa;
      --dim:       #71717a;
      --green:     #00ff00;
      --blue:      #007acc;
      --radius:    6px;
      --font:      'Geist Mono', 'SF Mono', 'Cascadia Code', 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ====== Scrollbar ====== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #333; }

    /* ====== Navbar ====== */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 56px;
      background: rgba(0,0,0,0.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo {
      font-size: 16px; font-weight: 700; color: var(--text);
      letter-spacing: -0.5px; text-decoration: none;
    }
    .nav-logo span { color: var(--green); }
    .typewriter {
      font-size: 13px; color: var(--dim); white-space: nowrap;
    }
    .cursor {
      display: inline-block; width: 1px; height: 14px;
      background: var(--green); margin-left: 2px; vertical-align: text-bottom;
      animation: blink 0.8s steps(1) infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .nav-links {
      display: flex; align-items: center; gap: 24px; list-style: none;
    }
    .nav-links a {
      font-size: 13px; color: var(--muted); text-decoration: none;
      transition: color 0.15s; letter-spacing: 0.3px;
    }
    .nav-links a:hover { color: var(--green); }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 20px; height: 1.5px;
      background: var(--text); transition: all 0.2s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .mobile-menu {
      display: none; flex-direction: column; gap: 0;
      position: absolute; top: 56px; left: 0; right: 0;
      background: rgba(0,0,0,0.95); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); padding: 8px 24px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 14px; color: var(--muted); text-decoration: none;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: var(--green); }

    /* ====== Layout ====== */
    .container { max-width: 720px; margin: 0 auto; padding: 0 24px; }
    section { margin: 64px 0; }

    .section-label {
      font-size: 13px; color: var(--green); margin-bottom: 12px;
      font-weight: 400; letter-spacing: 0.5px;
    }
    .section-label::before { content: '# '; color: var(--dim); }

    .section-title {
      font-size: 24px; font-weight: 700; margin-bottom: 24px;
      color: var(--text); letter-spacing: -0.5px;
    }

    /* ====== Cards ====== */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #333; }
    .card-list { display: flex; flex-direction: column; gap: 12px; }
    .card-date { font-size: 12px; color: var(--dim); margin-bottom: 6px; }
    .card-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .card-body { font-size: 14px; color: var(--muted); white-space: pre-wrap; line-height: 1.7; }

    /* ====== Learn Grid ====== */
    .learn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .learn-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 24px;
      border-left: 2px solid var(--blue); transition: border-color 0.15s;
    }
    .learn-card:hover { border-left-color: var(--green); }
    .learn-topic { font-size: 15px; font-weight: 600; color: var(--text); }
    .learn-progress { font-size: 12px; color: var(--dim); margin-top: 10px; }
    .learn-bar { height: 3px; background: #1a1a1a; border-radius: 1.5px; margin-top: 6px; overflow: hidden; }
    .learn-bar-fill { height: 100%; background: var(--blue); border-radius: 1.5px; transition: width 0.4s ease; }
    .learn-note { font-size: 12px; color: var(--dim); margin-top: 10px; line-height: 1.6; }

    /* ====== Suggest ====== */
    .suggest-meta { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; flex-wrap: wrap; gap: 4px; }
    .suggest-topic { font-weight: 600; color: var(--text); }
    .suggest-author { font-size: 11px; color: var(--dim); }

    /* ====== Buttons ====== */
    .add-btn {
      display: inline-block; margin-bottom: 16px;
      padding: 7px 18px; font-size: 13px; font-weight: 600; font-family: var(--font);
      color: var(--green); background: transparent;
      border: 1px solid var(--green); border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
    }
    .add-btn:hover { background: rgba(0,255,0,0.06); }
    .add-btn::before { content: '+ '; }

    .btn {
      padding: 9px 24px; font-size: 14px; font-weight: 600; font-family: var(--font);
      color: #000; background: var(--green); border: none; border-radius: var(--radius);
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-cancel {
      background: transparent; color: var(--muted); border: 1px solid var(--border);
    }
    .btn-cancel:hover { border-color: #444; color: var(--text); filter: none; }

    /* ====== Forms ====== */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
      display: none;
    }
    .form-card.open { display: block; }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      font-size: 14px; font-family: var(--font); color: var(--text);
      transition: border-color 0.15s; resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none; border-color: var(--green);
      box-shadow: 0 0 0 2px rgba(0,255,0,0.1);
    }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: #333; }
    .form-group textarea { min-height: 100px; }
    .form-row { display: flex; gap: 12px; }
    .form-actions { display: flex; align-items: center; gap: 10px; }

    /* ====== Token Button ====== */
    .token-btn {
      padding: 5px 12px; font-size: 11px; font-family: var(--font);
      border: 1px solid var(--border); border-radius: var(--radius);
      background: transparent; color: var(--dim); cursor: pointer;
      transition: all 0.15s;
    }
    .token-btn:hover { border-color: #444; color: var(--muted); }
    .token-btn.set { border-color: var(--green); color: var(--green); }

    /* ====== Spinner ====== */
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid #333; border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    .spinner.show { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ====== Toast ====== */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      padding: 10px 24px; border-radius: var(--radius);
      font-size: 13px; font-family: var(--font);
      opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; pointer-events: auto; }

    /* ====== Placeholder ====== */
    .placeholder {
      text-align: center; color: var(--dim); padding: 40px 0;
      font-size: 14px; grid-column: 1 / -1;
    }

    /* ====== Footer ====== */
    footer {
      text-align: center; padding: 48px 24px;
      font-size: 12px; color: var(--dim); border-top: 1px solid var(--border);
    }
    footer::before { content: '/* '; color: var(--dim); }
    footer::after { content: ' */'; color: var(--dim); }

    /* ====== Responsive ====== */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
      .container { padding: 0 16px; }
      section { margin: 48px 0; }
      .section-title { font-size: 20px; }
      .learn-grid { grid-template-columns: 1fr; }
      .typewriter { display: none; }
      .form-row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ====== Navbar ====== -->
  <nav class="navbar">
    <div class="nav-left">
      <a href="#" class="nav-logo"><span>&gt;</span> Keyou Web</a>
      <span class="typewriter"><span id="typewriterText"></span><span class="cursor"></span></span>
    </div>
    <ul class="nav-links">
      <li><a href="#diary">/diary</a></li>
      <li><a href="#learn">/learn</a></li>
      <li><a href="#discuss">/discuss</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="menu" onclick="toggleMenu()">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ====== Mobile Menu ====== -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="#diary" onclick="toggleMenu()">/diary</a>
    <a href="#learn" onclick="toggleMenu()">/learn</a>
    <a href="#discuss" onclick="toggleMenu()">/discuss</a>
  </div>

  <!-- ====== Main ====== -->
  <main class="container">

    <!-- 日记 -->
    <section id="diary">
      <p class="section-label">diary</p>
      <h2 class="section-title">日记</h2>
      <button class="add-btn" onclick="toggleForm('diaryForm')">写日记</button>
      <div class="form-card" id="diaryForm">
        <div class="form-group">
          <label>标题</label>
          <input type="text" id="diaryTitle" placeholder="今天想写什么？" maxlength="100">
        </div>
        <div class="form-group">
          <label>内容</label>
          <textarea id="diaryContent" placeholder="记录今天的想法…" maxlength="5000"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn" id="diarySubmit" onclick="submitDiary()">发布</button>
          <button class="btn btn-cancel" onclick="toggleForm('diaryForm')">取消</button>
          <div class="spinner" id="diarySpinner"></div>
        </div>
      </div>
      <div class="card-list" id="diaryList"><div class="placeholder">加载中…</div></div>
    </section>

    <!-- 自学 -->
    <section id="learn">
      <p class="section-label">learn</p>
      <h2 class="section-title">自学</h2>
      <button class="add-btn" onclick="toggleForm('learnForm')">添加主题</button>
      <div class="form-card" id="learnForm">
        <div class="form-group">
          <label>学习主题</label>
          <input type="text" id="learnTopic" placeholder="在学什么？" maxlength="100">
        </div>
        <div class="form-row">
          <div class="form-group" style="flex:1;">
            <label>进度 (%)</label>
            <input type="number" id="learnProgress" value="0" min="0" max="100">
          </div>
        </div>
        <div class="form-group">
          <label>备注（选填）</label>
          <textarea id="learnNote" placeholder="笔记、资源链接…" maxlength="2000"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn" id="learnSubmit" onclick="submitLearn()">添加</button>
          <button class="btn btn-cancel" onclick="toggleForm('learnForm')">取消</button>
          <div class="spinner" id="learnSpinner"></div>
        </div>
      </div>
      <div class="learn-grid" id="learnGrid"><div class="placeholder">加载中…</div></div>
    </section>

    <!-- 交流探讨 -->
    <section id="discuss">
      <p class="section-label">discuss</p>
      <h2 class="section-title">交流探讨</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:16px;">有任何想法或建议？欢迎留言。</p>
      <button class="add-btn" onclick="toggleForm('suggestForm')">提交建议</button>
      <div class="form-card" id="suggestForm">
        <div class="form-group">
          <label>昵称（选填）</label>
          <input type="text" id="suggestName" placeholder="你的昵称" maxlength="30">
        </div>
        <div class="form-group">
          <label>主题</label>
          <input type="text" id="suggestTopic" placeholder="想聊什么？" maxlength="100">
        </div>
        <div class="form-group">
          <label>内容</label>
          <textarea id="suggestContent" placeholder="说说你的想法或建议…" maxlength="2000"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn" id="suggestSubmit" onclick="submitSuggest()">提交</button>
          <button class="btn btn-cancel" onclick="toggleForm('suggestForm')">取消</button>
          <div class="spinner" id="suggestSpinner"></div>
        </div>
      </div>
      <div class="card-list" id="suggestions"><div class="placeholder">加载中…</div></div>
    </section>

  </main>

  <footer>&copy; 2026 Keyou Web</footer>

  <div class="toast" id="toast"></div>

  <script>
    // ====== Typewriter ======
    (function() {
      const words = ['portfolio', 'projects', 'blog', 'code', 'diary'];
      const el = document.getElementById('typewriterText');
      let wordIdx = 0, charIdx = 0, deleting = false;
      const typeSpeed = 100, deleteSpeed = 50, pauseTime = 2000;

      function tick() {
        const word = words[wordIdx];
        if (!deleting) {
          charIdx++;
          el.textContent = word.slice(0, charIdx);
          if (charIdx === word.length) { deleting = true; setTimeout(tick, pauseTime); return; }
          setTimeout(tick, typeSpeed);
        } else {
          charIdx--;
          el.textContent = word.slice(0, charIdx);
          if (charIdx === 0) { deleting = false; wordIdx = (wordIdx + 1) % words.length; setTimeout(tick, 300); return; }
          setTimeout(tick, deleteSpeed);
        }
      }
      tick();
    })();

    // ====== Mobile Menu ======
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('mobileMenu').classList.toggle('open');
    }

    // ====== GitHub Issues Integration ======
    const REPO = 'Keyou430/Keyou-web';
    const API = 'https://api.github.com';

    function getToken() { return (localStorage.getItem('gh_token') || '').trim(); }
    function setToken(t) { localStorage.setItem('gh_token', t); updateTokenBtn(); }

    function updateTokenBtn() {
      const btn = document.getElementById('tokenBtn');
      if (!btn) return;
      if (getToken()) { btn.textContent = 'Token [OK]'; btn.className = 'token-btn set'; }
      else { btn.textContent = 'Token [?]'; btn.className = 'token-btn'; }
    }

    function toggleTokenSetup() {
      if (getToken()) {
        if (confirm('当前已有 Token，更换或删除？\n\nOK = 更换\nCancel = 不变')) {
          const t = prompt('GitHub Personal Access Token（需 public_repo 权限）：');
          if (t !== null) setToken(t.trim());
        }
      } else {
        const t = prompt(
          'GitHub Personal Access Token（需 public_repo 权限）：\n\n' +
          'Settings → Developer settings → Tokens (classic)\n' +
          '→ Generate new token → 勾选 public_repo\n\n' +
          'Token 仅存储在本地浏览器。'
        );
        if (t !== null) setToken(t.trim());
      }
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(el._timeout);
      el._timeout = setTimeout(() => el.classList.remove('show'), 2500);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(isoStr) {
      const d = new Date(isoStr);
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0') + ' ' +
        String(d.getHours()).padStart(2, '0') + ':' +
        String(d.getMinutes()).padStart(2, '0');
    }

    function toggleForm(id) {
      const el = document.getElementById(id);
      el.classList.toggle('open');
    }

    // ====== API ======
    async function ghGet(path) {
      const headers = { 'Accept': 'application/vnd.github+json' };
      const token = getToken();
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const res = await fetch(API + path, { headers });
      if (!res.ok) throw new Error(res.status + ' ' + (await res.text()).slice(0, 200));
      return res.json();
    }

    async function ghPost(path, body) {
      const token = getToken();
      if (!token) { toast('请先设置 Token'); toggleTokenSetup(); throw new Error('no token'); }
      const res = await fetch(API + path, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || res.status);
      }
      return res.json();
    }

    // ====== Diary ======
    async function loadDiaries() {
      const list = document.getElementById('diaryList');
      list.innerHTML = '<div class="placeholder">加载中…</div>';
      try {
        const issues = await ghGet('/repos/' + REPO + '/issues?labels=diary&state=open&sort=created&direction=desc&per_page=50');
        if (issues.length === 0) {
          list.innerHTML = '<div class="placeholder">~ empty ~</div>';
        } else {
          list.innerHTML = issues.map(i => `
            <div class="card">
              <div class="card-date">${formatDate(i.created_at)}</div>
              <div class="card-title">${escapeHtml(i.title)}</div>
              <div class="card-body">${escapeHtml(i.body || '')}</div>
            </div>
          `).join('');
        }
      } catch (e) {
        list.innerHTML = '<div class="placeholder">加载失败: ' + escapeHtml(e.message) + '</div>';
      }
    }

    async function submitDiary() {
      const title = document.getElementById('diaryTitle').value.trim();
      const content = document.getElementById('diaryContent').value.trim();
      if (!title || !content) { toast('请填写标题和内容'); return; }
      const btn = document.getElementById('diarySubmit');
      const spinner = document.getElementById('diarySpinner');
      btn.disabled = true; spinner.classList.add('show');
      try {
        await ghPost('/repos/' + REPO + '/issues', { title, body: content, labels: ['diary'] });
        document.getElementById('diaryTitle').value = '';
        document.getElementById('diaryContent').value = '';
        toggleForm('diaryForm');
        toast('日记已发布');
        loadDiaries();
      } catch (e) {
        toast('发布失败: ' + e.message);
      } finally {
        btn.disabled = false; spinner.classList.remove('show');
      }
    }

    // ====== Learn ======
    async function loadLearns() {
      const grid = document.getElementById('learnGrid');
      grid.innerHTML = '<div class="placeholder">加载中…</div>';
      try {
        const issues = await ghGet('/repos/' + REPO + '/issues?labels=learn&state=open&sort=created&direction=desc&per_page=50');
        if (issues.length === 0) {
          grid.innerHTML = '<div class="placeholder">~ empty ~</div>';
        } else {
          grid.innerHTML = issues.map(i => {
            const body = i.body || '0';
            const progress = parseInt(body.split('\n')[0]) || 0;
            const note = body.split('\n').slice(1).join('\n').trim();
            return `
              <div class="learn-card">
                <div class="learn-topic">${escapeHtml(i.title)}</div>
                <div class="learn-progress">${progress}%</div>
                <div class="learn-bar"><div class="learn-bar-fill" style="width:${progress}%"></div></div>
                ${note ? '<div class="learn-note">' + escapeHtml(note) + '</div>' : ''}
              </div>
            `;
          }).join('');
        }
      } catch (e) {
        grid.innerHTML = '<div class="placeholder">加载失败: ' + escapeHtml(e.message) + '</div>';
      }
    }

    async function submitLearn() {
      const topic = document.getElementById('learnTopic').value.trim();
      const progress = document.getElementById('learnProgress').value;
      const note = document.getElementById('learnNote').value.trim();
      if (!topic) { toast('请填写学习主题'); return; }
      const body = (progress || '0') + '\n' + note;
      const btn = document.getElementById('learnSubmit');
      const spinner = document.getElementById('learnSpinner');
      btn.disabled = true; spinner.classList.add('show');
      try {
        await ghPost('/repos/' + REPO + '/issues', { title: topic, body, labels: ['learn'] });
        document.getElementById('learnTopic').value = '';
        document.getElementById('learnProgress').value = '0';
        document.getElementById('learnNote').value = '';
        toggleForm('learnForm');
        toast('学习主题已添加');
        loadLearns();
      } catch (e) {
        toast('添加失败: ' + e.message);
      } finally {
        btn.disabled = false; spinner.classList.remove('show');
      }
    }

    // ====== Suggestions ======
    async function loadSuggestions() {
      const container = document.getElementById('suggestions');
      container.innerHTML = '<div class="placeholder">加载中…</div>';
      try {
        const issues = await ghGet('/repos/' + REPO + '/issues?labels=suggest&state=open&sort=created&direction=desc&per_page=50');
        if (issues.length === 0) {
          container.innerHTML = '';
        } else {
          container.innerHTML = issues.map(i => {
            const body = i.body || '';
            const lines = body.split('\n');
            let author = '匿名';
            let content = body;
            if (lines[0].startsWith('By: ')) {
              author = lines[0].slice(4);
              content = lines.slice(1).join('\n').trim();
            }
            return `
              <div class="card">
                <div class="suggest-meta">
                  <span class="suggest-topic">${escapeHtml(i.title)}</span>
                  <span class="suggest-author">${escapeHtml(author)} · ${formatDate(i.created_at)}</span>
                </div>
                <div class="card-body">${escapeHtml(content)}</div>
              </div>
            `;
          }).join('');
        }
      } catch (e) {
        container.innerHTML = '<div class="placeholder">加载失败: ' + escapeHtml(e.message) + '</div>';
      }
    }

    async function submitSuggest() {
      const name = document.getElementById('suggestName').value.trim();
      const topic = document.getElementById('suggestTopic').value.trim();
      const content = document.getElementById('suggestContent').value.trim();
      if (!topic || !content) { toast('请填写主题和内容'); return; }
      const body = 'By: ' + (name || '匿名') + '\n' + content;
      const btn = document.getElementById('suggestSubmit');
      const spinner = document.getElementById('suggestSpinner');
      btn.disabled = true; spinner.classList.add('show');
      try {
        await ghPost('/repos/' + REPO + '/issues', { title: topic, body, labels: ['suggest'] });
        document.getElementById('suggestName').value = '';
        document.getElementById('suggestTopic').value = '';
        document.getElementById('suggestContent').value = '';
        toggleForm('suggestForm');
        toast('感谢你的建议');
        loadSuggestions();
      } catch (e) {
        toast('提交失败: ' + e.message);
      } finally {
        btn.disabled = false; spinner.classList.remove('show');
      }
    }

    // ====== Init ======
    updateTokenBtn();
    loadDiaries();
    loadLearns();
    loadSuggestions();
  </script>
</body>
</html>
